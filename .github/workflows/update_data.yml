name: Update OSINT Data

on:
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run OSINT Fetch & Analyze Script
        run: node scripts/fetch_and_analyze.mjs
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/latest_insights.json
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: update OSINT risk analysis data [skip ci]"
          git push
